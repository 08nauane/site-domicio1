<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">🍱 Marmitaria Sabor Caseiro</div>

    <nav>
        <a href="index.html">Início</a>
        <a href="montar.html">Monte Sua Marmita</a>
        <a href="cadastro.html">Cadastro</a>
    </nav>
</header>


<section class="formulario">

<h1>Cadastro de Cliente</h1>

<form id="formCadastro">

<input type="text" id="nome" placeholder="Nome Completo" required>

<input type="email" id="email" placeholder="Email" required>

<input type="tel" id="telefone" placeholder="Telefone" required>

<input type="text" id="endereco" placeholder="Endereço" required>

<input type="text" id="informacoes" placeholder="Informações adicionais(opcional)">

<button type="submit">Cadastrar</button>

</form>

</section>


<script>

document.getElementById("formCadastro").addEventListener("submit", function(event){

    event.preventDefault();


    // Criando o objeto cliente
    let telefone = document.getElementById("telefone").value;

    let cliente = {
        nome: document.getElementById("nome").value,
        email: document.getElementById("email").value,
        telefone: telefone,
        endereco: document.getElementById("endereco").value,

        // pega os 4 últimos números do telefone
        codigoEntrega: telefone.slice(-4)
    };


    // Pega clientes já cadastrados
    let clientes = JSON.parse(localStorage.getItem("clientes")) || [];


    // Adiciona o novo cliente
    clientes.push(cliente);


    // Salva todos os clientes
    localStorage.setItem(
        "clientes",
        JSON.stringify(clientes)
    );


    // Salva cliente atual
    localStorage.setItem(
        "clienteAtual",
        JSON.stringify(cliente)
    );


    // Verifica se existe pedido aguardando cadastro
    let pedidoPendente = JSON.parse(
        localStorage.getItem("pedidoPendente")
    );


    if(pedidoPendente){

        // adiciona os dados do cliente no pedido
        pedidoPendente.cliente = cliente;

        pedidoPendente.codigoEntrega = cliente.codigoEntrega;

        pedidoPendente.status = "Em preparação";


        // pega histórico existente
        let historico = JSON.parse(
            localStorage.getItem("historicoPedidos")
        ) || [];


        // salva o pedido completo
        historico.push(pedidoPendente);


        localStorage.setItem(
            "historicoPedidos",
            JSON.stringify(historico)
        );


        // remove pedido temporário
        localStorage.removeItem("pedidoPendente");


        alert(
            "Cadastro realizado com sucesso!\n\nSeu pedido foi confirmado!"
        );


        // vai para acompanhar pedido
        window.location.href = "acompanhar.html";


    } else {


        alert("Cadastro realizado com sucesso!");


        // caso não tenha pedido pendente
        window.location.href = "index.html";

    }


});

</script>

<script src="script.js"></script>

</body>
</html>
