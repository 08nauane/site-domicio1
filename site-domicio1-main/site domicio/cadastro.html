<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">🍱 Marmitaria Sabor Caseiro</div>

    <nav>
        <a href="index.html">Início</a>
        <a href="montar.html">Monte Sua Marmita</a>
        <a href="cadastro.html">Cadastro</a>
    </nav>
</header>


<section class="formulario">

<h1>Cadastro de Cliente</h1>

<form id="formCadastro">

<input type="text" id="nome" placeholder="Nome Completo" required>

<input type="email" id="email" placeholder="Email" required>

<input type="tel" id="telefone" placeholder="Telefone" required>

<input type="text" id="endereco" placeholder="Endereço" required>

<input type="text" id="informacoes" placeholder="Informações adicionais(opcional)" required>

<button type="submit">Cadastrar</button>

</form>

</section>


<script>

document.getElementById("formCadastro").addEventListener("submit", function(event){

    event.preventDefault();

    

    let cliente = {
        nome: document.getElementById("nome").value,
        email: document.getElementById("email").value,
        telefone: document.getElementById("telefone").value,
        endereco: document.getElementById("endereco").value,
        
    };

    // Pega os clientes já cadastrados
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

// Adiciona o novo cliente na matriz
clientes.push(cliente);

// Salva a matriz atualizada no navegador
localStorage.setItem("clientes", JSON.stringify(clientes));
    alert("Cadastro realizado com sucesso!");

    // Vai para a página de pagamento
    window.location.href = "pagamento.html";

});

</script>


<script src="script.js"></script>

</body>
</html>
