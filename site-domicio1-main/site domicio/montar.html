<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monte Sua Marmita</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="logo">🍱 Marmitaria Sabor Caseiro</div>

    <nav>
        <a href="index.html">Início</a>
        <a href="montar.html">Monte Sua Marmita</a>
        <a href="carrinho.html">🛒 Carrinho</a>
    </nav>

</header>


<section class="formulario">

<h1>Monte Sua Marmita</h1>

<form>


<label for="tamanho">Tamanho</label>

<select id="tamanho">
    <option>Marmita P</option>
    <option>Marmita M</option>
    <option>Marmita G</option>
</select>


<label for="arroz">Tipo de Arroz</label>

<select id="arroz">
    <option>Arroz Branco</option>
    <option>Arroz Integral</option>
</select>


<label for="proteina1">Proteína 1</label>

<select id="proteina1">
    <option>Frango Grelhado</option>
    <option>Bife Acebolado</option>
    <option>Carne Assada</option>
    <option>Linguiça Toscana</option>
</select>


<label for="proteina2">Proteína 2</label>

<select id="proteina2">
    <option>Frango Grelhado</option>
    <option>Bife Acebolado</option>
    <option>Carne Assada</option>
    <option>Linguiça Toscana</option>
</select>


<label for="acompanhamento">Acompanhamento</label>

<select id="acompanhamento">
    <option>Batata Frita</option>
    <option>Purê de Batata</option>
    <option>Macarrão</option>
    <option>Farofa</option>
    <option>Legumes Refogados (Cenoura, Abobrinha, Brócolis, Pimentão e Milho)</option>
</select>


<label for="salada">Salada</label>

<select id="salada">
    <option>Sem salada</option>
    <option>Alface e Tomate</option>
    <option>Alface, Cenoura e Beterraba</option>
    <option>Apenas Tomate</option>
    <option>Repolho</option>
    <option>Mix de Folhas (Alface, Rúcula e Tomate)</option>
</select>

<label for="bebida">Bebida</label>

<select id="bebida">
    <option>Sem bebida</option>
    <option>Água 500ml</option>
    <option>Guaraná 350ml</option>
    <option>Guaraná 600ml</option>
    <option>Coca-Cola 350ml</option>
    <option>Coca-Cola 600ml</option>
    <option>Sprite 350ml</option>
    <option>Sprite 600ml</option>
    <option>Fanta Laranja 350ml</option>
    <option>Fanta Laranja 600ml</option>
    <option>Fanta Uva 350ml</option>
    <option>Fanta Uva 600ml</option>
    <option>Pepsi 350ml</option>
    <option>Pepsi 600ml</option>
</select>

<label for="quantidade">
Quantidade de Marmitas
</label>

<input 
type="number"
id="quantidade"
value="1"
min="1"
max="50">

<label for="observacao">Observações</label>
<textarea
     id="observacao"
     placeholder="Ex.: sem cebola">
</textarea>

<button type="submit">
Adicionar ao Carrinho
</button>


</form>

</section>


<script src="script.js"></script>

</body>
</html>
