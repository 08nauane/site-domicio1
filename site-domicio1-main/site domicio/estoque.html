
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Estoque</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#ff7a00;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:bold;
}

.container{
    max-width:1000px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
    margin-bottom:20px;
    color:#333;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th,
table td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

table th{
    background:#ff7a00;
    color:white;
}

input{
    width:80px;
    padding:5px;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
}

.entrada{
    background:#28a745;
}

.saida{
    background:#dc3545;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:30px;
    background:#222;
    color:white;
}
</style>

</head>
<body>

<header>
    <div>🍱 Marmitaria Sabor Caseiro</div>

    <nav>
        <a href="index.html">Início</a>
        <a href="montar.html">Montar Marmita</a>
        <a href="cadastro.html">Cadastro</a>
        <a href="estoque.html">Estoque</a>
    </nav>
</header>

<div class="container">

<h1>Controle de Estoque</h1>

<table>
<thead>
<tr>
    <th>Item</th>
    <th>Quantidade</th>
    <th>Movimentação</th>
    <th>Ações</th>
</tr>
</thead>

<tbody>

<tr>
    <td>Frango Grelhado</td>
    <td id="qtd0">50</td>
    <td><input type="number" id="mov0" min="1"></td>
    <td>
        <button class="entrada" onclick="entrada(0)">Entrada</button>
        <button class="saida" onclick="saida(0)">Saída</button>
    </td>
</tr>

<tr>
    <td>Bife Acebolado</td>
    <td id="qtd1">40</td>
    <td><input type="number" id="mov1" min="1"></td>
    <td>
        <button class="entrada" onclick="entrada(1)">Entrada</button>
        <button class="saida" onclick="saida(1)">Saída</button>
    </td>
</tr>

<tr>
    <td>Arroz Branco</td>
    <td id="qtd2">100</td>
    <td><input type="number" id="mov2" min="1"></td>
    <td>
        <button class="entrada" onclick="entrada(2)">Entrada</button>
        <button class="saida" onclick="saida(2)">Saída</button>
    </td>
</tr>

<tr>
    <td>Feijão</td>
    <td id="qtd3">80</td>
    <td><input type="number" id="mov3" min="1"></td>
    <td>
        <button class="entrada" onclick="entrada(3)">Entrada</button>
        <button class="saida" onclick="saida(3)">Saída</button>
    </td>
</tr>

<tr>
    <td>Batata Frita</td>
    <td id="qtd4">35</td>
    <td><input type="number" id="mov4" min="1"></td>
    <td>
        <button class="entrada" onclick="entrada(4)">Entrada</button>
        <button class="saida" onclick="saida(4)">Saída</button>
    </td>
</tr>

<tr>
    <td>Linguiça Toscana</td>
    <td id="qtd1">58</td>
    <td><input type="number" id="mov1" min="1"></td>
    <td>
        <button class="entrada" onclick="entrada(1)">Entrada</button>
        <button class="saida" onclick="saida(1)">Saída</button>
    </td>
</tr>
<tr>
    <td>Filé de Frango Empanado</td>
    <td id="qtd1">25</td>
    <td><input type="number" id="mov1" min="1"></td>
    <td>
        <button class="entrada" onclick="entrada(1)">Entrada</button>
        <button class="saida" onclick="saida(1)">Saída</button>
    </td>
    
</tr>

</tbody>
</table>

</div>

<footer>
    <p>© 2026 Marmitaria Sabor Caseiro</p>
</footer>

<script>

function entrada(id){

    let qtd = document.getElementById("qtd"+id);
    let mov = document.getElementById("mov"+id);

    let atual = parseInt(qtd.innerText);
    let valor = parseInt(mov.value);

    if(!valor || valor <= 0){
        alert("Digite uma quantidade válida.");
        return;
    }

    qtd.innerText = atual + valor;
    mov.value = "";
}

function saida(id){

    let qtd = document.getElementById("qtd"+id);
    let mov = document.getElementById("mov"+id);

    let atual = parseInt(qtd.innerText);
    let valor = parseInt(mov.value);

    if(!valor || valor <= 0){
        alert("Digite uma quantidade válida.");
        return;
    }

    if(valor > atual){
        alert("Estoque insuficiente.");
        return;
    }

    qtd.innerText = atual - valor;
    mov.value = "";
}

</script>

</body>
