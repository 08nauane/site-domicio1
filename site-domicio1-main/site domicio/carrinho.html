<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrinho - Marmitaria Sabor Caseiro</title>

<link rel="stylesheet" href="style.css">

<style>
    body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:linear-gradient(180deg,#fff8f4,#fff3eb);
    margin:0;
    color:#444;
}

header{
    background:linear-gradient(135deg,#ff8a4c,#ff6b35);
    color:white;
    padding:25px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,.12);
}

header h1{
    margin:0;
    font-size:32px;
}

nav{
    margin-top:15px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:600;
    transition:.3s;
}

nav a:hover{
    opacity:.8;
}

main{
    max-width:950px;
    margin:40px auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:12px;
}

thead{
    background:#fff0e8;
}

th{
    color:#ff6b35;
    padding:15px;
    font-size:16px;
}

td{
    padding:18px 15px;
    border-bottom:1px solid #f3e3da;
}

tr:hover{
    background:#fff9f6;
}

.total{
    margin-top:30px;
    background:#fff7f2;
    border-left:5px solid #ff6b35;
    padding:20px;
    border-radius:12px;
}

.total p{
    display:flex;
    justify-content:space-between;
    font-size:18px;
    margin:10px 0;
}

.total p:last-child{
    font-size:24px;
    font-weight:bold;
    color:#ff6b35;
}

button{
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
    font-size:15px;
}

td button{
    width:34px;
    height:34px;
    margin:0 6px;
    background:#ffe4d6;
    color:#ff6b35;
    font-size:20px;
    font-weight:bold;
}

td button:hover{
    background:#ff6b35;
    color:white;
}

.btn-finalizar{
    background:#ff6b35;
    color:white;
    padding:14px 30px;
    font-weight:bold;
    margin-top:30px;
    margin-right:15px;
}

.btn-finalizar:hover{
    background:#e75b26;
    transform:translateY(-2px);
}

.btn-limpar{
    background:white;
    color:#ff6b35;
    border:2px solid #ff6b35;
    padding:14px 30px;
    font-weight:bold;
}

.btn-limpar:hover{
    background:#ff6b35;
    color:white;
}

@media(max-width:700px){

    main{
        margin:20px;
        padding:20px;
    }

    table{
        font-size:14px;
    }

    .btn-finalizar,
    .btn-limpar{
        width:100%;
        margin-top:15px;
    }
}
</style>

</head>
<body>

<header>
<h1>🛒 Carrinho de Compras</h1>
    <nav>
        <a href="index.html">Início</a>
        <a href="montar.html">Monte Sua Marmita</a>
    </nav>
</header>

<main>

<table>
<thead>
<tr>
    <th>Pedido</th>
    <th>Quantidade</th>
    <th>Preço</th>
</tr>
</thead>

<tbody id="listaPedidos">

</tbody>
                
</table>

<div class="total">
<p>Subtotal: <span id="subtotal">R$ 0,00</span></p>
<p>Taxa de entrega: <span id="entrega">R$ 4,00</span></p>
<p>Total: <span id="total">R$ 0,00</span></p>
</div>

 

<button onclick="finalizarPedido()" class="btn-finalizar">
    Finalizar Pedido
</button>

<button onclick="esvaziarCarrinho()" class="btn-limpar">
    Esvaziar Carrinho
</button>

</main>

<script src="script.js"></script>
</body>
</html>
